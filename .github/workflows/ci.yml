name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '**.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Duplicated from Makefile ZAP_VERSION (no shared source between Makefile +
  # workflow). The annotation below lets Renovate's workflow-yaml customManager
  # bump this in the same PR as the Makefile constant — no drift.
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0

jobs:

  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Static check
        run: make static-check

  test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Test
        run: make test

  integration-test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Integration test
        run: make integration-test
        env:
          VITE_RPCENDPOINT: https://ethereum-rpc.publicnode.com

  e2e:
    # KinD-in-Docker inside act doesn't behave reliably; the `make ci-run` target
    # passes `--var ACT=true` to act so this guard skips the job locally.
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: E2E (KinD + curl via kind extraPortMappings)
        run: make e2e

      # Browser-level e2e — only this layer actually executes JS in a real
      # browser. Without it, CSP violations (script-src blocking inline
      # scripts, missing nonces) and runtime errors in the SPA bundle can
      # ship green. Reuses the cluster from `make e2e` above.
      - name: E2E Browser (Playwright Chromium against deployed SPA)
        run: make e2e-browser

      - name: Tail pod logs on failure
        if: failure()
        run: kubectl -n web3 logs -l app=web3-sample-app --tail=200 || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: ignore

  build:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    needs: [static-check, build, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC (Sigstore Fulcio)

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}

      # ===============================================================
      # GATE 1 — local single-arch build (load: true) for scan + smoke
      # ===============================================================
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: web3-sample-app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===============================================================
      # GATE 2 — Trivy image scan (CRITICAL/HIGH blocking)
      # ===============================================================
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: web3-sample-app:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # ===============================================================
      # GATE 3 — smoke test (boot, curl /internal/isalive, clean up)
      # ===============================================================
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=web3-sample-app-smoke -p 8080:8080 web3-sample-app:scan >/dev/null
          end=$(( "$(date +%s)" + 30 ))
          while [ "$(date +%s)" -lt $end ]; do
            if curl -fsS http://localhost:8080/internal/isalive >/dev/null 2>&1; then
              echo "PASS: nginx booted and serving"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: nginx did not become ready within 30s"
          docker logs web3-sample-app-smoke
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f web3-sample-app-smoke 2>/dev/null || true

      # ===============================================================
      # All gates passed → publish multi-arch
      # ===============================================================
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===============================================================
      # Post-push: cosign keyless signing by digest
      # ===============================================================
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  dast:
    # Runs in parallel with `docker`. Skipped under act because ZAP's docker-
    # in-docker bind mount of $GITHUB_WORKSPACE/zap-output doesn't round-trip
    # through act's host docker daemon. `make ci-run` passes --var ACT=true.
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: web3-sample-app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (boot for ZAP target)
        run: |
          set -euo pipefail
          docker run -d --name=web3-sample-app-smoke -p 8080:8080 web3-sample-app:scan >/dev/null
          end=$(( "$(date +%s)" + 30 ))
          while [ "$(date +%s)" -lt $end ]; do
            if curl -fsS http://localhost:8080/internal/isalive >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs web3-sample-app-smoke
          exit 1

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        run: make dast-scan

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f web3-sample-app-smoke 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  ci-pass:
    if: always()
    needs: [static-check, build, test, integration-test, e2e, dast, docker]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
