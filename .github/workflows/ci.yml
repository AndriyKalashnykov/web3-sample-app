name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter on pull_request events

env:
  # Duplicated from Makefile ZAP_VERSION (no shared source between Makefile +
  # workflow). The annotation below lets Renovate's workflow-yaml customManager
  # bump this in the same PR as the Makefile constant — no drift.
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0
  # Smoke/DAST target host+port (the image EXPOSEs this port). `vars.*` lets an
  # operator override without editing the workflow; defaults mirror .env.example.
  APP_INTERNAL_PORT: ${{ vars.APP_INTERNAL_PORT || '8080' }}
  HEALTHCHECK_HOST: ${{ vars.HEALTHCHECK_HOST || 'localhost' }}

jobs:

  changes:
    # Job-level path filter (Rulesets-safe — heavy jobs gate on the output but
    # the workflow itself always runs, so `ci-pass` always reports a status).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # On tag pushes the diff against `main` may be empty (the tag points at
      # the same SHA), which would skip everything — force `code=true`.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
      # Markdown changes gate a lightweight mermaid-lint job (README mermaid is
      # docs-excluded from `code`, so static-check's mermaid-lint never sees it).
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # `base` is ignored on pull_request events — leave empty there.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|benchmarks/**|LICENSE|.gitignore|.claudeignore|.claude/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
              # Re-include PlantUML diagram sources: a .puml edit must run
              # static-check -> diagrams-check so stale PNGs can't merge.
              - 'docs/diagrams/**/*.puml'
            docs:
              - '**.md'

  mermaid-lint:
    # README/docs mermaid blocks are docs-excluded from `code`, so a docs-only
    # change skips static-check (which runs mermaid-lint). Gate the lint here for
    # docs-only changes so a broken README diagram can't ship ungated. Code
    # changes already run mermaid-lint inside static-check, so skip it there.
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.docs == 'true' && needs.changes.outputs.code != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Mermaid lint
        run: make mermaid-lint

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Static check
        run: make static-check

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Integration test
        run: make integration-test
        env:
          VITE_RPCENDPOINT: ${{ vars.VITE_RPCENDPOINT || 'https://ethereum-rpc.publicnode.com' }}

  e2e:
    # KinD-in-Docker inside act doesn't behave reliably; the `make ci-run` target
    # passes `--var ACT=true` to act so this guard skips the job locally.
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Reuse cached prod-image layers across runs (and across make e2e +
    # make e2e-browser) so the e2e job doesn't cold-build Dockerfile.prod each run.
    env:
      DOCKER_BUILD_CACHE: "--cache-from type=gha --cache-to type=gha,mode=max"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Exports ACTIONS_RUNTIME_TOKEN + ACTIONS_CACHE_URL so the Makefile's raw
      # `docker buildx build --cache-to type=gha` (DOCKER_BUILD_CACHE) can reach the
      # GitHub Actions cache. docker/build-push-action does this internally; a raw
      # buildx invocation needs the runtime exported explicitly.
      - name: Export Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      # KinD + curl assertions against the deployed SPA via the cloud-provider-kind
      # LoadBalancer IP.
      - name: Run end-to-end tests
        run: make e2e

      # Browser-level e2e — only this layer actually executes JS in a real
      # browser. Without it, CSP violations (script-src blocking inline
      # scripts, missing nonces) and runtime errors in the SPA bundle can
      # ship green. Reuses the cluster from `make e2e` above.
      - name: Run Playwright tests
        run: make e2e-browser

      - name: Tail pod logs
        if: failure()
        run: kubectl --context=kind-web3-sample-app -n web3 logs -l app=web3-sample-app --tail=200 || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: ignore

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

      - name: Upload build artifact
        # act's local artifact server speaks the v4 protocol; v7's request
        # envelope (mime_type field) trips it. Real GHA accepts v7 fine —
        # match the e2e/dast vars.ACT pattern instead of pinning back to v4.
        if: ${{ vars.ACT != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    # Build, scan, and publish the production image ONLY on tag pushes (releases
    # — `make release` cuts a `vN.N.N` tag). On non-tag pushes this whole job is
    # skipped, so no image is built/scanned/published on ordinary commits.
    # NOTE: the Dockerfile is still exercised on every push by the `e2e` job
    # (KinD deploy builds the prod image), so a broken Dockerfile is still caught
    # pre-tag there — but the image SCAN / structure-test / SBOM only run on tags.
    needs: [changes, static-check, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC (Sigstore Fulcio) — gated to tag-push steps below

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # job publishes to GHCR (OIDC/GITHUB_TOKEN), never pushes git

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          # metadata-action lowercases the image name automatically, which is
          # important because GHCR requires lowercase repo names.
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}

      # ===============================================================
      # GATE 1 — local single-arch build (load: true) for scan + smoke
      # ===============================================================
      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: web3-sample-app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===============================================================
      # GATE 2 — Trivy image scan (CRITICAL/HIGH blocking)
      # ===============================================================
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: web3-sample-app:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      # ===============================================================
      # GATE 2.5 — container structure test (USER, entrypoint, labels, files)
      # ===============================================================
      - name: Container structure test
        run: make container-structure-test-only CST_IMAGE=web3-sample-app:scan

      # ===============================================================
      # GATE 2.7 — SBOM (SPDX) via Trivy. Generated as a separate artifact +
      # cosign attestation (below) rather than via buildx `sbom: true`, which
      # would break the GHCR "OS / Arch" tab. Preserves the manifest UI while
      # still publishing a verifiable SBOM.
      # ===============================================================
      - name: Generate SPDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: web3-sample-app:scan
          scan-type: image
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM
        # act's local artifact server speaks the v4 protocol; upload-artifact v7
        # trips it (same reason the build-artifact upload is ACT-gated). The SBOM
        # is consumed on real GHA only (cosign reads the workspace file directly,
        # not the artifact), so skipping the upload under act is safe.
        if: ${{ vars.ACT != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      # ===============================================================
      # GATE 3 — smoke test (boot, curl /internal/isalive, clean up)
      # ===============================================================
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=web3-sample-app-smoke -p "${APP_INTERNAL_PORT}:${APP_INTERNAL_PORT}" web3-sample-app:scan >/dev/null
          end=$(( "$(date +%s)" + 30 ))
          while [ "$(date +%s)" -lt $end ]; do
            if curl -fsS "http://${HEALTHCHECK_HOST}:${APP_INTERNAL_PORT}/internal/isalive" >/dev/null 2>&1; then
              echo "PASS: Caddy booted and serving"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: Caddy did not become ready within 30s"
          docker logs web3-sample-app-smoke
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f web3-sample-app-smoke 2>/dev/null || true

      # ===============================================================
      # All gates passed → publish (linux/amd64)
      # ===============================================================
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The job only runs on tag pushes, so this always publishes. Single-arch
      # (linux/amd64); arm64 dropped to keep CI fast (no QEMU cross-build).
      - name: Build and push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===============================================================
      # Post-push: cosign keyless signing by digest (tag pushes only)
      # ===============================================================
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      - name: Attest SBOM with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          # Attest once by digest (the SBOM is identical across tags); use the
          # repo of the first metadata tag (already lowercased by metadata-action).
          tag="${TAGS%%$'\n'*}"
          repo="${tag%:*}"
          echo "→ cosign attest spdxjson ${repo}@${DIGEST}"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${repo}@${DIGEST}"

  dast:
    # Tag-push only (mirrors `docker`): builds the prod image + runs the OWASP ZAP
    # baseline at release, not on every commit. Also skipped under act because
    # ZAP's docker-in-docker bind mount of $GITHUB_WORKSPACE/zap-output doesn't
    # round-trip through act's host docker daemon. `make ci-run` passes --var ACT=true.
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: web3-sample-app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=web3-sample-app-smoke -p "${APP_INTERNAL_PORT}:${APP_INTERNAL_PORT}" web3-sample-app:scan >/dev/null
          end=$(( "$(date +%s)" + 30 ))
          while [ "$(date +%s)" -lt $end ]; do
            if curl -fsS "http://${HEALTHCHECK_HOST}:${APP_INTERNAL_PORT}/internal/isalive" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs web3-sample-app-smoke
          exit 1

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        run: make dast-scan

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f web3-sample-app-smoke 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  ci-pass:
    if: always()
    needs: [changes, mermaid-lint, static-check, build, test, integration-test, e2e, dast, docker]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
