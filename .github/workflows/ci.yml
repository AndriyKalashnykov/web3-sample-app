name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter on pull_request events

env:
  # Duplicated from Makefile ZAP_VERSION (no shared source between Makefile +
  # workflow). The annotation below lets Renovate's workflow-yaml customManager
  # bump this in the same PR as the Makefile constant — no drift.
  # renovate: datasource=github-releases depName=zaproxy/zaproxy extractVersion=^v(?<version>.*)$
  ZAP_VERSION: 2.17.0
  # Smoke/DAST target host+port (the image EXPOSEs this port). `vars.*` lets an
  # operator override without editing the workflow; defaults mirror .env.example.
  APP_INTERNAL_PORT: ${{ vars.APP_INTERNAL_PORT || '8080' }}
  HEALTHCHECK_HOST: ${{ vars.HEALTHCHECK_HOST || 'localhost' }}

jobs:

  changes:
    # Job-level path filter (Rulesets-safe — heavy jobs gate on the output but
    # the workflow itself always runs, so `ci-pass` always reports a status).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # On tag pushes the diff against `main` may be empty (the tag points at
      # the same SHA), which would skip everything — force `code=true`.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # `base` is ignored on pull_request events — leave empty there.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|LICENSE|.gitignore|.claudeignore|.claude/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Static check
        run: make static-check

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Test
        run: make test

  integration-test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Integration test
        run: make integration-test
        env:
          VITE_RPCENDPOINT: ${{ vars.VITE_RPCENDPOINT || 'https://ethereum-rpc.publicnode.com' }}

  e2e:
    # KinD-in-Docker inside act doesn't behave reliably; the `make ci-run` target
    # passes `--var ACT=true` to act so this guard skips the job locally.
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      # KinD + curl assertions against the deployed SPA via the cloud-provider-kind
      # LoadBalancer IP.
      - name: Run end-to-end tests
        run: make e2e

      # Browser-level e2e — only this layer actually executes JS in a real
      # browser. Without it, CSP violations (script-src blocking inline
      # scripts, missing nonces) and runtime errors in the SPA bundle can
      # ship green. Reuses the cluster from `make e2e` above.
      - name: Run Playwright tests
        run: make e2e-browser

      - name: Tail pod logs
        if: failure()
        run: kubectl --context=kind-web3-sample-app -n web3 logs -l app=web3-sample-app --tail=200 || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
          if-no-files-found: ignore

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make install

      - name: Build
        run: make build

      - name: Upload build artifact
        # act's local artifact server speaks the v4 protocol; v7's request
        # envelope (mime_type field) trips it. Real GHA accepts v7 fine —
        # match the e2e/dast vars.ACT pattern instead of pinning back to v4.
        if: ${{ vars.ACT != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker:
    # Pattern A: validate on every push (Gates 1-3 + linux/amd64 validation
    # build), publish + sign only on tag pushes. Catches regressions before
    # release day instead of on it.
    needs: [changes, static-check, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write   # cosign keyless OIDC (Sigstore Fulcio) — gated to tag-push steps below

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          # metadata-action lowercases the image name automatically, which is
          # important because GHCR requires lowercase repo names.
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}

      # ===============================================================
      # GATE 1 — local single-arch build (load: true) for scan + smoke
      # ===============================================================
      - name: Build image for scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: web3-sample-app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===============================================================
      # GATE 2 — Trivy image scan (CRITICAL/HIGH blocking)
      # ===============================================================
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: web3-sample-app:scan
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      # ===============================================================
      # GATE 2.5 — container structure test (USER, entrypoint, labels, files)
      # ===============================================================
      - name: Container structure test
        run: container-structure-test test --image web3-sample-app:scan --config container-structure-test.yaml

      # ===============================================================
      # GATE 2.7 — SBOM (SPDX) via Trivy. Generated as a separate artifact +
      # cosign attestation (below) rather than via buildx `sbom: true`, which
      # would break the GHCR "OS / Arch" tab. Preserves the manifest UI while
      # still publishing a verifiable SBOM.
      # ===============================================================
      - name: Generate SBOM (SPDX)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: web3-sample-app:scan
          scan-type: image
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      # ===============================================================
      # GATE 3 — smoke test (boot, curl /internal/isalive, clean up)
      # ===============================================================
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=web3-sample-app-smoke -p "${APP_INTERNAL_PORT}:${APP_INTERNAL_PORT}" web3-sample-app:scan >/dev/null
          end=$(( "$(date +%s)" + 30 ))
          while [ "$(date +%s)" -lt $end ]; do
            if curl -fsS "http://${HEALTHCHECK_HOST}:${APP_INTERNAL_PORT}/internal/isalive" >/dev/null 2>&1; then
              echo "PASS: Caddy booted and serving"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: Caddy did not become ready within 30s"
          docker logs web3-sample-app-smoke
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f web3-sample-app-smoke 2>/dev/null || true

      # ===============================================================
      # All gates passed → publish (linux/amd64)
      # ===============================================================
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On non-tag pushes this runs as a validation build (push: false) so
      # build regressions surface before tag day. Single-arch (linux/amd64);
      # arm64 dropped to keep CI fast (no QEMU cross-build).
      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===============================================================
      # Post-push: cosign keyless signing by digest (tag pushes only)
      # ===============================================================
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      - name: Attest SBOM with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          # Attest once by digest (the SBOM is identical across tags); use the
          # repo of the first metadata tag (already lowercased by metadata-action).
          tag="${TAGS%%$'\n'*}"
          repo="${tag%:*}"
          echo "→ cosign attest spdxjson ${repo}@${DIGEST}"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${repo}@${DIGEST}"

  dast:
    # Runs in parallel with `docker`. Skipped under act because ZAP's docker-
    # in-docker bind mount of $GITHUB_WORKSPACE/zap-output doesn't round-trip
    # through act's host docker daemon. `make ci-run` passes --var ACT=true.
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' && vars.ACT != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image for scan
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.prod
          platforms: linux/amd64
          load: true
          tags: web3-sample-app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name=web3-sample-app-smoke -p "${APP_INTERNAL_PORT}:${APP_INTERNAL_PORT}" web3-sample-app:scan >/dev/null
          end=$(( "$(date +%s)" + 30 ))
          while [ "$(date +%s)" -lt $end ]; do
            if curl -fsS "http://${HEALTHCHECK_HOST}:${APP_INTERNAL_PORT}/internal/isalive" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs web3-sample-app-smoke
          exit 1

      - name: Cache ZAP image
        id: cache-zap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/zap-image.tar
          key: zap-image-${{ env.ZAP_VERSION }}-${{ runner.os }}

      - name: Load cached ZAP image
        run: |
          set -euo pipefail
          if [ -f /tmp/zap-image.tar ]; then
            echo "Loading ZAP from cache..."
            docker load -i /tmp/zap-image.tar
          else
            echo "Pulling ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}..."
            docker pull "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}"
            docker save "ghcr.io/zaproxy/zaproxy:${ZAP_VERSION}" -o /tmp/zap-image.tar
          fi

      - name: OWASP ZAP baseline scan
        run: make dast-scan

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f web3-sample-app-smoke 2>/dev/null || true

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: zap-output/
          retention-days: 30
          if-no-files-found: ignore

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, e2e, dast, docker]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
