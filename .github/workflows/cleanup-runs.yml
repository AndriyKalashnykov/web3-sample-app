name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      pull-requests: read   # exclude open-PR head SHAs from deletion (make cleanup-runs)
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: make cleanup-runs

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Delete caches from merged or deleted branches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: make cleanup-caches
