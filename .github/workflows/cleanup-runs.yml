name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Delete old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: make cleanup-runs

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
    steps:
      - name: Delete caches from merged or deleted branches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh cache list --limit 100 --json id,ref \
            --jq '.[] | select(.ref | startswith("refs/pull/") or contains("/merge")) | .id' \
          | while read -r cache_id; do
              echo "Deleting cache $cache_id"
              gh cache delete "$cache_id" || true
            done
