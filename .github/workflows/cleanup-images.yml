name: cleanup-images

on:
  schedule:
    - cron: '0 3 * * 0' # weekly, Sunday 3am UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:

  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old untagged container images
        uses: actions/delete-package-versions@25ad4af5be03aef10e0b3376b248688b7a44c40b # v5
        with:
          package-name: web3-sample-app
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true
