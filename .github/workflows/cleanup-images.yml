name: cleanup-images

on:
  schedule:
    - cron: '0 3 * * 0' # weekly, Sunday 3am UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
    steps:
      - name: Delete old untagged container images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PACKAGE="web3-sample-app"
          OWNER="${{ github.repository_owner }}"
          KEEP=5

          echo "Fetching untagged versions of $PACKAGE..."
          gh api \
            --paginate \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions" \
            --jq '.[] | select(.metadata.container.tags | length == 0) | .id' \
          | tail -n +$((KEEP + 1)) \
          | while read -r version_id; do
              echo "Deleting version $version_id"
              gh api --method DELETE \
                "/users/${OWNER}/packages/container/${PACKAGE}/versions/${version_id}" \
                || true
            done
          echo "Cleanup complete."
