apiVersion: apps/v1
kind: Deployment
metadata:
  name: web3-sample-app
  labels:
    app.kubernetes.io/name: web3-sample-app
    app.kubernetes.io/component: web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: web3-sample-app
  template:
    metadata:
      labels:
        app: web3-sample-app
        app.kubernetes.io/name: web3-sample-app
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # readOnlyRootFilesystem on the main container blocks start-caddy.sh's
      # envsubst write to /srv/config.js. The init container seeds a writable
      # emptyDir with the baked SPA bundle; the main container mounts that
      # emptyDir over /srv so start-caddy.sh can rewrite config.js at startup.
      # Caddy itself (with admin off / auto_https off / persist_config off)
      # needs no writable state directories beyond /srv and /tmp.
      initContainers:
        - name: seed-html
          image: ghcr.io/andriykalashnykov/web3-sample-app:0.0.18
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - cp -R /srv/. /work/
          volumeMounts:
            - name: static-html
              mountPath: /work
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        - name: web3-sample-app
          # Renovate-tracked via the kubernetes manager (kubernetes.managerFilePatterns scopes it to k8s/**/*.yaml).
          image: ghcr.io/andriykalashnykov/web3-sample-app:0.0.18
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: web3-sample-app-config
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: static-html
              mountPath: /srv
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          startupProbe:
            httpGet:
              path: /internal/isalive
              port: http
            failureThreshold: 30
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: /internal/isalive
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /internal/isready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
      volumes:
        - name: static-html
          emptyDir: {}
        - name: tmp
          emptyDir: {}
