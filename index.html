<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="//fonts.googleapis.com/icon?family=Material+Icons" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web3-sample-app</title>
  </head>
  <body>
    <!--
      Runtime configuration (Pattern C). `/config.js` is generated by
      start-nginx.sh's envsubst pass against `config.js.template` at
      container start with values from the container env (k8s ConfigMap /
      docker -e). Loaded as an external file (not inline) so strict CSP
      `script-src 'self'` doesn't need 'unsafe-inline' or a per-deploy
      nonce/hash. In `pnpm dev`, the placeholders in the template pass
      through untouched and src/config.ts detects them and falls through
      to import.meta.env from `.env`.
    -->
    <script src="/config.js"></script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
