server {
    listen       8080;
    server_name  localhost;

    # Don't leak nginx version in the Server response header (ZAP rule 10036).
    server_tokens off;

    # Built assets must 404 when missing — never fall back to index.html
    # (silently masks missing-asset bugs in production).
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    location / {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Headers' 'Access-Control-Allow-Headers,Authorization,DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type' always;
        add_header 'Access-Control-Allow-Methods' 'DELETE, GET, POST, PUT, OPTIONS' always;

        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html;
    }

    location /rpc {
      proxy_read_timeout 60s;

      # May not need or want to set Host. Should default to the above hostname.
      proxy_set_header          Host            $host;
      proxy_set_header          X-Real-IP       $remote_addr;
      proxy_set_header          X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /publicnode {
        return 307 https://ethereum-rpc.publicnode.com;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Health probes use `default_type` (not `add_header Content-Type`) so
    # they don't shadow server-level security headers via nginx's add_header
    # scope-override behavior.
    location /internal/isalive {
        access_log off;
        default_type text/plain;
        return 200 "ALIVE\n";
    }

    location /internal/isready {
        access_log off;
        default_type text/plain;
        return 200 "READY\n";
    }
}