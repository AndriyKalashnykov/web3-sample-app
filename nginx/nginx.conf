server {
    listen       8080;
    server_name  localhost;

    # Don't leak nginx version in the Server response header (ZAP rule 10036).
    server_tokens off;

    # ------------------------------------------------------------------
    # Security headers — set at server scope so they inherit into every
    # location block that does NOT define its own `add_header` (which would
    # otherwise shadow them per nginx's scope rules). Probe locations use
    # `default_type` instead of `add_header Content-Type` precisely to keep
    # this inheritance working.
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    # CSP: connect-src allows any HTTPS endpoint so VITE_RPCENDPOINT can be
    # overridden per environment without rewriting the policy. style-src
    # 'unsafe-inline' is required because MUI/emotion inject runtime styles.
    # COEP=require-corp is intentionally NOT set — it would block the cross-
    # origin RPC fetch since the public RPC endpoint doesn't ship CORP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Built assets must 404 when missing — never fall back to index.html
    # (silently masks missing-asset bugs in production). Long cache for the
    # hash-named files; nginx's `expires` sets Cache-Control directly so it
    # doesn't trigger the add_header scope-override that would shadow the
    # server-level security headers.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
    }

    # SPA root — index.html and any unknown route fall back to the SPA shell.
    # `expires -1` emits Cache-Control: no-cache so contributors don't ship
    # a stale HTML wrapper after a deploy.
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html;
        expires -1;
    }

    # Reverse-proxy passthrough (currently unused — placeholder for a future
    # /rpc proxy that fronts an upstream JSON-RPC node).
    location /rpc {
        proxy_read_timeout 60s;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Convenience redirect to the project default public RPC endpoint.
    location /publicnode {
        return 307 https://ethereum-rpc.publicnode.com;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Health probes use `default_type` (not `add_header Content-Type`) so
    # they don't shadow server-level security headers via nginx's add_header
    # scope-override behavior.
    location /internal/isalive {
        access_log off;
        default_type text/plain;
        return 200 "ALIVE\n";
    }

    location /internal/isready {
        access_log off;
        default_type text/plain;
        return 200 "READY\n";
    }
}
