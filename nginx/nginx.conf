server {
    listen       8080;
    server_name  localhost;

    # Don't leak nginx version in the Server response header (ZAP rule 10036).
    server_tokens off;

    # ------------------------------------------------------------------
    # Security headers — set at server scope so they inherit into every
    # location block that does NOT define its own `add_header` (which would
    # otherwise shadow them per nginx's scope rules). Probe locations use
    # `default_type` instead of `add_header Content-Type` precisely to keep
    # this inheritance working. Locations that DO need their own add_header
    # (e.g. /config.js's Cache-Control: no-store) must re-include this
    # partial; otherwise nginx silently drops every server-scope add_header
    # for that path.
    # ------------------------------------------------------------------
    include /etc/nginx/conf.d/security-headers.conf;

    # Built assets must 404 when missing — never fall back to index.html
    # (silently masks missing-asset bugs in production). Long cache for the
    # hash-named files; nginx's `expires` sets Cache-Control directly so it
    # doesn't trigger the add_header scope-override that would shadow the
    # server-level security headers.
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
    }

    # Runtime config (Pattern C). start-nginx.sh's envsubst pass writes
    # /config.js per-container-start with values from the env. Never cache
    # — env values can change between deploys, and this is tiny (~150B).
    # 404 if missing (don't fall back to index.html under SPA route — the
    # browser would try to parse HTML as JS).
    location = /config.js {
        root /usr/share/nginx/html;
        try_files $uri =404;
        # Re-include server-scope security headers — nginx's add_header scope
        # rule replaces ALL inherited headers with the inner block's set, so
        # without this include the CSP/X-Frame-Options/etc. silently vanish
        # for /config.js. Cache-Control: no-store is a stronger semantics
        # than `expires -1`'s no-cache; we don't want any caching of runtime
        # config (env values change between deploys).
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-store" always;
    }

    # SPA root — index.html and any unknown route fall back to the SPA shell.
    # `expires -1` emits Cache-Control: no-cache so contributors don't ship
    # a stale HTML wrapper after a deploy.
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri /index.html;
        expires -1;
    }

    # Reverse-proxy passthrough (currently unused — placeholder for a future
    # /rpc proxy that fronts an upstream JSON-RPC node).
    location /rpc {
        proxy_read_timeout 60s;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Convenience redirect to the project default public RPC endpoint.
    location /publicnode {
        return 307 https://ethereum-rpc.publicnode.com;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # Health probes use `default_type` (not `add_header Content-Type`) so
    # they don't shadow server-level security headers via nginx's add_header
    # scope-override behavior.
    location /internal/isalive {
        access_log off;
        default_type text/plain;
        return 200 "ALIVE\n";
    }

    location /internal/isready {
        access_log off;
        default_type text/plain;
        return 200 "READY\n";
    }
}
