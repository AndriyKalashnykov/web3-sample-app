# Security response headers shared between the server scope AND any location
# block that defines its own `add_header` (nginx's scope rule replaces ALL
# inherited add_headers with the inner ones — so a block that needs to set
# Cache-Control etc. MUST also re-include this file or the security headers
# silently vanish for that path). Real incident: /ship-it 2026-05-07 — the
# new e2e assertions caught /config.js shipping with no CSP/X-Frame-Options/
# X-Content-Type-Options/Referrer-Policy because the inline `Cache-Control:
# no-store` shadowed all server-scope headers. Fix: include this partial in
# every location that also calls add_header.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
# CSP: connect-src allows any HTTPS endpoint so VITE_RPCENDPOINT can be
# overridden per environment without rewriting the policy. style-src
# 'unsafe-inline' is required because MUI/emotion inject runtime styles.
# COEP=require-corp is intentionally NOT set — it would block the cross-
# origin RPC fetch since the public RPC endpoint doesn't ship CORP.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
